<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Колыбель — рабочее пространство</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#EE1A6F">
<style>
:root{
  --bg-cream:#FBF5EC; --bg-pink:#FCE8ED; --bg-sand:#F3E7D6; --bg-sky:#E9F1F8; --bg-lavender:#F1E8F6;
  --accent-blush:#F3CCD6; --accent-peach:#EFDAB9; --accent-sky:#C7DEF0; --accent-lavender:#DCC6EA;
  --accent-bright:#EE1A6F; --accent-bright-soft:#FF6FA0;
  --text-dark:#56423A; --text-soft:#8A7166; --white:#fff;
  --radius:16px; --radius-lg:24px;
  --shadow:0 10px 28px rgba(86,66,58,.10); --shadow-hover:0 18px 40px rgba(86,66,58,.16);
  --font-display:'Manrope',Arial,sans-serif; --font-body:'Inter',Arial,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--font-body);color:var(--text-dark);background:linear-gradient(180deg,var(--bg-pink) 0%, var(--bg-cream) 320px);line-height:1.6;min-height:100vh;}
a{color:inherit;text-decoration:none;}
.wrap{max-width:1100px;margin:0 auto;padding:0 24px;}
img{max-width:100%;display:block;}

/* top bar */
.tool-header{background:var(--white);border-bottom:3px solid var(--accent-bright);position:sticky;top:0;z-index:100;}
.tool-header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0;flex-wrap:wrap;gap:10px;}
.tool-logo{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--text-dark);}
.tool-logo .icon{width:26px;height:26px;color:var(--accent-bright);}
.tool-nav{display:flex;gap:6px;flex-wrap:wrap;}
.tool-nav a{padding:9px 18px;border-radius:999px;font-weight:600;font-size:14px;color:var(--text-soft);transition:background .15s ease, color .15s ease;white-space:nowrap;}
.tool-nav a:hover{background:var(--bg-pink);color:var(--accent-bright);}
.tool-nav a.active{background:var(--accent-bright);color:#fff;}
.tool-badge{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--accent-bright);background:var(--bg-pink);padding:4px 12px;border-radius:999px;white-space:nowrap;}
@media(max-width:760px){
  .tool-header-inner{justify-content:center;}
  .tool-nav{width:100%;justify-content:center;}
  .tool-nav a{padding:7px 12px;font-size:12.5px;}
  .tool-badge{display:none;}
}

/* hero */
.tool-hero{padding:50px 0 36px;text-align:center;}
.tool-hero h1{font-family:var(--font-display);font-weight:700;font-size:34px;color:var(--text-dark);margin:14px 0 12px;}
.tool-hero p{font-size:15.5px;color:var(--text-soft);max-width:640px;margin:0 auto;}

/* cards on landing */
.tool-cards{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:40px 0 60px;}
.tool-card{background:var(--white);border-radius:var(--radius-lg);padding:36px 32px;box-shadow:var(--shadow);transition:transform .2s ease, box-shadow .2s ease;display:block;border-left:4px solid var(--accent-bright);}
.tool-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);}
.tool-card .icon-wrap{width:54px;height:54px;border-radius:16px;background:var(--bg-pink);display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.tool-card .icon-wrap .icon{width:26px;height:26px;color:var(--accent-bright);}
.tool-card h2{font-family:var(--font-display);font-size:20px;margin:0 0 10px;color:var(--text-dark);}
.tool-card p{font-size:14px;color:var(--text-soft);margin:0 0 16px;}
.tool-card .go{font-weight:700;font-size:13.5px;color:var(--accent-bright);}
@media(max-width:760px){.tool-cards{grid-template-columns:1fr;}}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 26px;border-radius:999px;font-weight:700;font-size:14.5px;
  font-family:var(--font-display);background:linear-gradient(135deg,var(--accent-bright-soft),var(--accent-bright));color:#fff;border:none;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .2s ease;}
.btn:hover{transform:translateY(-2px);}
.btn-outline{background:#fff;color:var(--accent-bright);border:1.5px solid var(--accent-bright);box-shadow:none;}

/* standard / training manual page */
.std-layout{display:grid;grid-template-columns:260px 1fr;gap:36px;padding:30px 0 70px;align-items:start;min-width:0;}
.std-layout > *{min-width:0;}
@media(max-width:760px){
  .std-layout{grid-template-columns:1fr;}
  .std-toc{position:static;}
}
.std-toc{position:sticky;top:84px;background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.std-toc h4{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-soft);margin:0 0 12px;}
.std-toc a{display:block;font-size:13.5px;color:var(--text-dark);padding:7px 10px;border-radius:8px;margin-bottom:2px;}
.std-toc a:hover{background:var(--bg-pink);color:var(--accent-bright);}
.std-content section{background:var(--white);border-radius:var(--radius-lg);padding:30px 34px;box-shadow:var(--shadow);margin-bottom:26px;}
.std-content h2{font-family:var(--font-display);font-size:22px;color:var(--accent-bright);margin:0 0 16px;display:flex;align-items:center;gap:10px;}
.std-content h3{font-size:16px;color:var(--text-dark);margin:22px 0 10px;}
.std-content p{font-size:14.5px;color:var(--text-dark);margin:0 0 12px;}
.std-content ol,.std-content ul{margin:0 0 14px;padding-left:22px;}
.std-content li{font-size:14.5px;margin-bottom:7px;line-height:1.55;}
.script-box{background:var(--bg-sky);border-left:3px solid var(--accent-bright);border-radius:0 12px 12px 0;padding:14px 18px;margin:14px 0;font-size:14px;color:var(--text-dark);font-style:italic;}
.script-box b{font-style:normal;color:var(--accent-bright);}
.warn-box{background:#FBEAEA;border-left:3px solid #C0265A;border-radius:0 12px 12px 0;padding:14px 18px;margin:14px 0;font-size:13.5px;color:#7A2240;font-weight:600;}
.tip-box{background:var(--bg-lavender);border-radius:12px;padding:14px 18px;margin:14px 0;font-size:13.5px;}
.check-list{list-style:none;padding:0;margin:0 0 14px;}
.check-list li{display:flex;gap:10px;font-size:14px;margin-bottom:9px;}
.check-list li::before{content:"";flex:none;width:18px;height:18px;border:2px solid var(--accent-bright);border-radius:5px;margin-top:1px;}
.price-table-wrap{overflow-x:auto;margin:14px 0;}
.price-table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:420px;}
.price-table th{background:var(--bg-pink);color:var(--accent-bright);text-align:left;padding:10px 14px;font-weight:700;}
.price-table td{padding:10px 14px;border-bottom:1px solid var(--bg-sand);}
.price-table tr:nth-child(even) td{background:var(--bg-cream);}
.step-num-badge{flex:none;width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent-bright-soft),var(--accent-bright));color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;}
.step-flex{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start;}
.step-flex .step-body{flex:1;}
.step-flex .step-body h3{margin-top:0;}
.template-box{background:var(--text-dark);color:#fff;border-radius:12px;padding:16px 20px;margin:14px 0;font-size:13px;line-height:1.7;white-space:pre-line;}
.template-box b{color:var(--accent-blush);}

/* anketa builder page */
.builder-layout{display:grid;grid-template-columns:1fr 1fr;gap:32px;padding:30px 0 70px;align-items:start;}
@media(max-width:900px){.builder-layout{grid-template-columns:1fr;}}
.builder-form{background:var(--white);border-radius:var(--radius-lg);padding:30px 32px;box-shadow:var(--shadow);}
.builder-form h2{font-family:var(--font-display);font-size:19px;margin:0 0 20px;}
.field{margin-bottom:16px;}
.field label{display:block;font-weight:700;font-size:13px;margin-bottom:6px;color:var(--text-dark);}
.field input[type=text],.field input[type=number],.field textarea,.field select{
  width:100%;padding:11px 14px;border:1.5px solid var(--accent-sky);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;
}
.field textarea{resize:vertical;min-height:64px;}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;}
.photo-drop{border:2px dashed var(--accent-sky);border-radius:14px;padding:20px;text-align:center;cursor:pointer;background:var(--bg-cream);}
.photo-drop:hover{border-color:var(--accent-bright);}
.photo-drop img{max-height:140px;margin:0 auto;border-radius:10px;}
.photo-drop .ph-placeholder{color:var(--text-soft);font-size:13px;}
.rule-card{background:#fff;border-radius:24px;padding:30px 34px;box-shadow:var(--shadow);margin-bottom:60px;display:flex;gap:28px;align-items:center;}
.rule-card img{width:160px;height:160px;border-radius:18px;object-fit:cover;flex:none;}
@media(max-width:600px){.rule-card{flex-direction:column;text-align:center;}.rule-card img{width:130px;height:130px;}}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13.5px;}
.checkbox-row input{width:17px;height:17px;accent-color:var(--accent-bright);}
.builder-preview{background:var(--white);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow);text-align:center;position:sticky;top:84px;}
.builder-preview h2{font-family:var(--font-display);font-size:17px;margin:0 0 16px;text-align:left;}
.builder-preview canvas{max-width:100%;border-radius:12px;box-shadow:var(--shadow);}
.builder-preview .placeholder-msg{padding:60px 10px;color:var(--text-soft);font-size:13.5px;}
.builder-actions{margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

.splash{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.splash svg{width:48px;height:48px;color:var(--accent-bright);}
.splash p{color:var(--text-soft);font-size:14px;}
</style>
</head>
<body style="background:var(--bg-cream);">

</svg>

<div class="splash">
  <svg><use href="#logo-mark"></use></svg>
  <p>Загрузка…</p>
</div>
<script>
(async function(){
  try {
    var res = await fetch('/.netlify/functions/check-session');
    var data = await res.json();
    if(data.ok){
      window.location.href = (data.role === 'director') ? 'director-dashboard.html' : 'manager-dashboard.html';
    } else {
      window.location.href = 'login.html';
    }
  } catch(e){
    window.location.href = 'login.html';
  }
})();
</script>
</body>
</html>
